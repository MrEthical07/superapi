name: Bug report
description: Report a reproducible defect in SuperAPI.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it reliably.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact sequence of actions to trigger the issue.
      placeholder: |
        1. Set env vars ...
        2. Run command ...
        3. Call endpoint ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include logs/errors if available.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Go version, OS, profile/mode, and dependency versions.
      placeholder: |
        Go 1.26
        OS: linux/amd64
        APP_PROFILE=dev
        Redis 7.x
        Postgres 15.x
